<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>端午節龍舟著色遊戲</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .toolbar {
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .color-picker-group, .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .swatches {
            display: flex;
            gap: 5px;
        }
        .swatch {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #ccc;
            transition: transform 0.2s;
        }
        .swatch:hover {
            transform: scale(1.1);
        }
        .swatch.selected {
            border-color: #333;
            transform: scale(1.1);
        }
        input[type="color"] {
            width: 40px;
            height: 40px;
            border: none;
            cursor: pointer;
            padding: 0;
            border-radius: 5px;
        }
        button {
            padding: 8px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #45a049;
        }
        .canvas-container {
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: auto;
            max-width: 100%;
        }
        canvas {
            display: block;
            cursor: crosshair;
        }
        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="control-group">
            <label for="imageLoader" style="cursor:pointer;">
                <button onclick="document.getElementById('imageLoader').click()">📂 上傳圖片</button>
            </label>
            <input type="file" id="imageLoader" accept="image/*">
            <button id="saveBtn">💾 儲存作品</button>
        </div>

        <div class="color-picker-group">
            <input type="color" id="colorPicker" value="#FF5722">
            <div class="swatches" id="swatches">
                </div>
        </div>

        <div class="control-group">
            <label for="tolerance" title="數值越小偵測越嚴格，數值越大越容易蓋過模糊的黑線">填色容差值:</label>
            <input type="range" id="tolerance" min="0" max="150" value="60">
        </div>
    </div>

    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const colorPicker = document.getElementById('colorPicker');
        const imageLoader = document.getElementById('imageLoader');
        const toleranceSlider = document.getElementById('tolerance');
        const swatchesContainer = document.getElementById('swatches');
        
        let currentColor = colorPicker.value;
        const presetColors = ['#FF5722', '#FFC107', '#8BC34A', '#03A9F4', '#9C27B0', '#E91E63', '#795548', '#FFFFFF'];

        // 建立色票 UI
        presetColors.forEach(color => {
            const swatch = document.createElement('div');
            swatch.className = 'swatch';
            swatch.style.backgroundColor = color;
            if (color === currentColor) swatch.classList.add('selected');
            
            swatch.onclick = () => {
                currentColor = color;
                colorPicker.value = color;
                document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
                swatch.classList.add('selected');
            };
            swatchesContainer.appendChild(swatch);
        });

        colorPicker.addEventListener('input', (e) => {
            currentColor = e.target.value;
            document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
        });

        // 嘗試自動載入同資料夾的圖片
        const img = new Image();
        img.src = 'dragon-boat-colouring.jpg';
        img.onload = () => {
            initCanvas(img);
        };
        img.onerror = () => {
            drawPlaceholder();
        };

        // 處理手動上傳
        imageLoader.addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const uploadedImg = new Image();
                uploadedImg.onload = () => initCanvas(uploadedImg);
                uploadedImg.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        function initCanvas(loadedImg) {
            canvas.width = loadedImg.width;
            canvas.height = loadedImg.height;
            ctx.drawImage(loadedImg, 0, 0);
            
            // 測試瀏覽器 CORS 限制 (直接點開本機 HTML 可能會阻擋讀取像素)
            try {
                ctx.getImageData(0, 0, 1, 1);
            } catch (e) {
                alert("⚠️ 瀏覽器安全性限制：\n無法直接處理本機檔案路徑的圖片像素。\n請點擊上方的「📂 上傳圖片」按鈕手動選取 dragon-boat-colouring.jpg 來開始著色！");
                drawPlaceholder();
            }
        }

        function drawPlaceholder() {
            canvas.width = 600;
            canvas.height = 400;
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#666666';
            ctx.font = '20px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText("請點擊上方「📂 上傳圖片」", canvas.width/2, canvas.height/2 - 15);
            ctx.fillText("載入 dragon-boat-colouring.jpg", canvas.width/2, canvas.height/2 + 15);
        }

        // HEX 轉 RGB
        function hexToRgb(hex) {
            const bigint = parseInt(hex.replace('#', ''), 16);
            return { r: (bigint >> 16) & 255, g: (bigint >> 8) & 255, b: bigint & 255 };
        }

        // 計算顏色差距 (歐式距離)
        function colorDistance(r1, g1, b1, r2, g2, b2) {
            return Math.sqrt((r1 - r2)**2 + (g1 - g2)**2 + (b1 - b2)**2);
        }

        // 核心：油漆桶演算法 (Span Filling Algorithm)
        function floodFill(startX, startY, fillColorHex, tolerance) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const width = canvas.width;
            const height = canvas.height;

            const startPos = (startY * width + startX) * 4;
            const startR = data[startPos];
            const startG = data[startPos + 1];
            const startB = data[startPos + 2];

            const fillRgb = hexToRgb(fillColorHex);

            // 如果選中的顏色與當前點擊的顏色已經相同或在容差內，則不執行 (避免無限迴圈)
            if (colorDistance(startR, startG, startB, fillRgb.r, fillRgb.g, fillRgb.b) <= tolerance) {
                return;
            }

            const queue = [[startX, startY]];

            // 判斷該像素是否需要被填色
            function matchStartColor(pos) {
                const pr = data[pos];
                const pg = data[pos+1];
                const pb = data[pos+2];
                // 忽略全透明像素
                if (data[pos+3] === 0) return false;
                return colorDistance(pr, pg, pb, startR, startG, startB) <= tolerance;
            }

            while (queue.length > 0) {
                const [x, y] = queue.shift();
                let currY = y;

                // 往上找到邊界
                while (currY >= 0 && matchStartColor((currY * width + x) * 4)) {
                    currY--;
                }
                currY++;

                let spanLeft = false;
                let spanRight = false;

                // 往下填色並檢查左右像素
                while (currY < height && matchStartColor((currY * width + x) * 4)) {
                    const pos = (currY * width + x) * 4;
                    data[pos] = fillRgb.r;
                    data[pos+1] = fillRgb.g;
                    data[pos+2] = fillRgb.b;
                    data[pos+3] = 255;

                    if (x > 0) {
                        const matchLeft = matchStartColor((currY * width + x - 1) * 4);
                        if (matchLeft && !spanLeft) {
                            queue.push([x - 1, currY]);
                            spanLeft = true;
                        } else if (!matchLeft && spanLeft) {
                            spanLeft = false;
                        }
                    }

                    if (x < width - 1) {
                        const matchRight = matchStartColor((currY * width + x + 1) * 4);
                        if (matchRight && !spanRight) {
                            queue.push([x + 1, currY]);
                            spanRight = true;
                        } else if (!matchRight && spanRight) {
                            spanRight = false;
                        }
                    }
                    currY++;
                }
            }
            ctx.putImageData(imageData, 0, 0);
        }

        // 滑鼠點擊觸發填色
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            // 考慮 canvas CSS 縮放比例
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            const x = Math.floor((e.clientX - rect.left) * scaleX);
            const y = Math.floor((e.clientY - rect.top) * scaleY);

            const tolerance = parseInt(toleranceSlider.value);
            floodFill(x, y, currentColor, tolerance);
        });

        // 儲存圖片
        document.getElementById('saveBtn').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'colored-dragon-boat.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    </script>
</body>
</html>
