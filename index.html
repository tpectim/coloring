<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>端午節龍舟著色遊戲 - 完美無捲軸版</title>
    <style>
        /* 鎖定整個網頁，不允許出現網頁層級的捲軸 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e8e8f0;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        
        /* 工具列：單列 + 左右滑動 */
        .toolbar {
            background: white;
            padding: 3px 3px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            gap: 3px;
            align-items: center;
            margin: 10px;
            
            width: calc(100% - 20px);
            box-sizing: border-box;
            flex-shrink: 0; 
            flex-wrap: nowrap;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .toolbar::-webkit-scrollbar { height: 6px; }
        .toolbar::-webkit-scrollbar-thumb { background-color: #ccc; border-radius: 3px; }

        .control-group {
            display: flex;
            align-items: center;
            gap: 3px;
            padding-right: 3px;
            border-right: 1px solid #ddd;
            flex-shrink: 0;
        }
        .control-group:last-child {
            border-right: none;
            padding-right: 0;
        }
        
        .swatches { display: flex; gap: 5px; }
        .swatch {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #ccc;
            transition: transform 0.2s;
            flex-shrink: 0;
        }
        .swatch:hover, .swatch.selected {
            transform: scale(1.15);
            border-color: #333;
        }
        input[type="color"] {
            width: 25px;
            height: 25px;
            border: none;
            cursor: pointer;
            padding: 0;
            border-radius: 5px;
            flex-shrink: 0;
        }
        
        button {
            padding: 3px 12px;
            background-color: #f0f0f0;
            color: #333;
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            white-space: nowrap;
        }
        button:hover { background-color: #e0e0e0; }
        button.active-tool {
            background-color: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }
        button.action-btn {
            background-color: #2196F3;
            color: white;
            border-color: #2196F3;
        }
        button.danger-btn {
            background-color: #f44336;
            color: white;
            border-color: #f44336;
        }
        
        /* 畫布容器：自動填滿剩餘高度 */
        .canvas-wrapper {
            width: 100%;
            flex-grow: 1; 
            overflow: auto; 
            display: flex; 
            position: relative;
        }
        
        canvas {
            display: block;
            margin: auto; 
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            border-radius: 5px;
            transform-origin: center center;
            cursor: crosshair;
            touch-action: none;
        }
        input[type="file"] { display: none; }
        label { font-size: 0.9em; font-weight: bold; color: #555; white-space: nowrap; }
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="control-group">
            <label for="imageLoader" style="cursor:pointer;">
                <button class="action-btn" onclick="document.getElementById('imageLoader').click()">📂 上傳</button>
            </label>
            <input type="file" id="imageLoader" accept="image/*">
            <button class="action-btn" id="saveBtn">💾 儲存</button>
        </div>

        <div class="control-group">
            <button id="undoBtn">↩️ 復原</button>
            <button id="clearBtn" class="danger-btn">🗑️ 清除</button>
        </div>

        <div class="control-group">
            <button id="toolBucket" class="active-tool">🪣 填色</button>
            <button id="toolBrush">🖌️ 畫筆</button>
            <label for="brushSize">粗細:</label>
            <input type="range" id="brushSize" min="1" max="50" value="10" style="width: 50px;">
        </div>

        <div class="control-group">
            <input type="color" id="colorPicker" value="#FF5722">
            <div class="swatches" id="swatches"></div>
        </div>

        <div class="control-group">
            <label for="zoom">🔍 縮放:</label>
            <input type="range" id="zoom" min="0.5" max="3" step="0.1" value="1" style="width: 50px;">
            <label for="tolerance">容差:</label>
            <input type="range" id="tolerance" min="0" max="150" value="60" style="width: 50px;">
            
            <label style="display: flex; align-items: center; gap: 4px; cursor: pointer;" title="開啟時，碰到畫布邊緣的區域將無法填色（可防止漏色填滿背景）">
                <input type="checkbox" id="lockBg" checked>
                保護背景
            </label>
        </div>
    </div>

    <div class="canvas-wrapper" id="wrapper">
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const wrapper = document.getElementById('wrapper');
        const lockBgCheckbox = document.getElementById('lockBg');
        
        // UI 元素
        const colorPicker = document.getElementById('colorPicker');
        const imageLoader = document.getElementById('imageLoader');
        const toleranceSlider = document.getElementById('tolerance');
        const zoomSlider = document.getElementById('zoom');
        const brushSizeSlider = document.getElementById('brushSize');
        const swatchesContainer = document.getElementById('swatches');
        const toolBucketBtn = document.getElementById('toolBucket');
        const toolBrushBtn = document.getElementById('toolBrush');
        
        let currentColor = colorPicker.value;
        let currentTool = 'bucket';
        let isDrawing = false;
        let isFilling = false;
        let lastFillPos = { x: -1, y: -1 };
        let originalImageData = null;
        let undoStack = [];
        const MAX_UNDO_STEPS = 20;

        const presetColors = ['#FF5722', '#FFC107', '#8BC34A', '#03A9F4', '#9C27B0', '#E91E63', '#795548', '#FFFFFF', '#000000'];

        presetColors.forEach(color => {
            const swatch = document.createElement('div');
            swatch.className = 'swatch';
            swatch.style.backgroundColor = color;
            if (color === currentColor) swatch.classList.add('selected');
            swatch.onclick = () => {
                currentColor = color;
                colorPicker.value = color;
                updateSwatchSelection(swatch);
            };
            swatchesContainer.appendChild(swatch);
        });

        colorPicker.addEventListener('input', (e) => {
            currentColor = e.target.value;
            updateSwatchSelection(null);
        });

        function updateSwatchSelection(selectedElement) {
            document.querySelectorAll('.swatch').forEach(s => s.classList.remove('selected'));
            if (selectedElement) selectedElement.classList.add('selected');
        }

        toolBucketBtn.onclick = () => setTool('bucket');
        toolBrushBtn.onclick = () => setTool('brush');

        function setTool(tool) {
            currentTool = tool;
            toolBucketBtn.classList.toggle('active-tool', tool === 'bucket');
            toolBrushBtn.classList.toggle('active-tool', tool === 'brush');
        }

        zoomSlider.addEventListener('input', (e) => {
            canvas.style.transform = `scale(${e.target.value})`;
        });

        const img = new Image();
        img.src = 'dragon-boat-colouring.jpg';
        img.onload = () => initCanvas(img);
        img.onerror = () => drawPlaceholder();

        imageLoader.addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const uploadedImg = new Image();
                uploadedImg.onload = () => initCanvas(uploadedImg);
                uploadedImg.src = event.target.result;
            }
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        });

        function initCanvas(loadedImg) {
            zoomSlider.value = 1;
            canvas.style.transform = `scale(1)`;

            const availableWidth = wrapper.clientWidth * 0.95;
            const availableHeight = wrapper.clientHeight * 0.95;
            
            const imgWidth = loadedImg.width;
            const imgHeight = loadedImg.height;
            const ratio = Math.min(availableWidth / imgWidth, availableHeight / imgHeight);
            
            canvas.width = imgWidth * ratio;
            canvas.height = imgHeight * ratio;
            
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(loadedImg, 0, 0, canvas.width, canvas.height);
            
            try {
                originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                undoStack = [];
            } catch (e) {
                alert("⚠️ 無法直接讀取本地檔案，請手動點擊「上傳」按鈕。");
                drawPlaceholder();
            }
        }

        function drawPlaceholder() {
            canvas.width = wrapper.clientWidth * 0.8;
            canvas.height = wrapper.clientHeight * 0.8;
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#666666';
            ctx.font = '20px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText("請點擊「📂 上傳」載入圖片", canvas.width/2, canvas.height/2);
        }

        function saveState() {
            if (undoStack.length >= MAX_UNDO_STEPS) undoStack.shift();
            undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
        }

        document.getElementById('undoBtn').addEventListener('click', () => {
            if (undoStack.length > 0) ctx.putImageData(undoStack.pop(), 0, 0);
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            if (originalImageData && confirm('確定要清除所有顏色？')) {
                saveState();
                ctx.putImageData(originalImageData, 0, 0);
            }
        });

        function hexToRgb(hex) {
            const bigint = parseInt(hex.replace('#', ''), 16);
            return { r: (bigint >> 16) & 255, g: (bigint >> 8) & 255, b: bigint & 255 };
        }
        function colorDistance(r1, g1, b1, r2, g2, b2) {
            return Math.sqrt((r1 - r2)**2 + (g1 - g2)**2 + (b1 - b2)**2);
        }

        // 核心填色演算法
        function floodFill(startX, startY, fillColorHex, tolerance) {
            const isBgLocked = lockBgCheckbox.checked; // 取得是否鎖定背景
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const width = canvas.width, height = canvas.height;

            const startPos = (startY * width + startX) * 4;
            const startR = data[startPos], startG = data[startPos+1], startB = data[startPos+2];
            
            const fillRgb = hexToRgb(fillColorHex);
            const queue = [[startX, startY]];

            function matchStartColor(pos) {
                const pr = data[pos], pg = data[pos+1], pb = data[pos+2], pa = data[pos+3];
                if (pa === 0) return false;
                if ((pr * 0.299 + pg * 0.587 + pb * 0.114) < 50) return false; 
                return colorDistance(pr, pg, pb, startR, startG, startB) <= tolerance;
            }

            while (queue.length > 0) {
                const [x, y] = queue.shift();
                let currY = y;
                while (currY >= 0 && matchStartColor((currY * width + x) * 4)) currY--;
                currY++;

                let spanLeft = false, spanRight = false;
                while (currY < height && matchStartColor((currY * width + x) * 4)) {
                    
                    // 【保護背景核心邏輯】如果填色的範圍碰到了畫布的最邊緣，立即取消填色！
                    if (isBgLocked && (x === 0 || x === width - 1 || currY === 0 || currY === height - 1)) {
                        return false; // 回傳失敗，不更新畫布
                    }

                    const pos = (currY * width + x) * 4;
                    data[pos] = fillRgb.r; data[pos+1] = fillRgb.g; data[pos+2] = fillRgb.b; data[pos+3] = 255;

                    if (x > 0) {
                        const matchLeft = matchStartColor((currY * width + x - 1) * 4);
                        if (matchLeft && !spanLeft) { queue.push([x - 1, currY]); spanLeft = true; }
                        else if (!matchLeft && spanLeft) spanLeft = false;
                    }
                    if (x < width - 1) {
                        const matchRight = matchStartColor((currY * width + x + 1) * 4);
                        if (matchRight && !spanRight) { queue.push([x + 1, currY]); spanRight = true; }
                        else if (!matchRight && spanRight) spanRight = false;
                    }
                    currY++;
                }
            }
            // 若成功跑完且沒碰到邊緣，才把顏色更新到畫布上
            ctx.putImageData(imageData, 0, 0);
            return true;
        }

        // 觸發填色與優化復原步驟紀錄
        function doContinuousFill(x, y, isFirstClick = false) {
            if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) return false;
            const pixel = ctx.getImageData(x, y, 1, 1).data;
            if (pixel[3] === 0 || (pixel[0] * 0.299 + pixel[1] * 0.587 + pixel[2] * 0.114) < 50) return false; 

            const targetRgb = hexToRgb(currentColor);
            const tolerance = parseInt(toleranceSlider.value);
            if (colorDistance(pixel[0], pixel[1], pixel[2], targetRgb.r, targetRgb.g, targetRgb.b) <= tolerance) return false;

            // 如果是點擊的第一下，先存檔備用
            if (isFirstClick) saveState(); 

            const success = floodFill(x, y, currentColor, tolerance);

            // 如果填色被「保護背景」機制擋下，或是沒填到色，就取消剛才存的復原步驟
            if (!success && isFirstClick) {
                undoStack.pop(); 
            }
            return success;
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: Math.floor((e.clientX - rect.left) * scaleX),
                y: Math.floor((e.clientY - rect.top) * scaleY)
            };
        }

        canvas.addEventListener('pointerdown', (e) => {
            const pos = getMousePos(e);
            
            if (currentTool === 'bucket') {
                isFilling = true;
                doContinuousFill(pos.x, pos.y, true); // true 代表是滑鼠/手指按下的第一下
                lastFillPos = pos;
            } else if (currentTool === 'brush') {
                saveState(); 
                isDrawing = true;
                ctx.globalCompositeOperation = 'multiply';
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = parseInt(brushSizeSlider.value);
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
            }
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!isDrawing && !isFilling) return;
            const pos = getMousePos(e);
            
            if (currentTool === 'brush' && isDrawing) {
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
            } else if (currentTool === 'bucket' && isFilling) {
                if (Math.hypot(pos.x - lastFillPos.x, pos.y - lastFillPos.y) > 5) {
                    doContinuousFill(pos.x, pos.y, false); // false 代表是拖曳中
                    lastFillPos = pos;
                }
            }
        });

        const stopAction = () => {
            if (isDrawing) {
                isDrawing = false;
                ctx.globalCompositeOperation = 'source-over'; 
            }
            isFilling = false;
        };

        canvas.addEventListener('pointerup', stopAction);
        canvas.addEventListener('pointerout', stopAction);
        canvas.addEventListener('pointercancel', stopAction);

        document.getElementById('saveBtn').addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'colored-dragon-boat.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
</html>
